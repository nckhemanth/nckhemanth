<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="Phoenix accent">
  <defs>
    <linearGradient id="wingL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="wingR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="core" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="45%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: 180px 128px; }
    .wingL { animation: flapL 2.4s ease-in-out infinite; transform-origin: 180px 118px; }
    .wingR { animation: flapR 2.4s ease-in-out infinite; transform-origin: 180px 118px; }
    .tail { animation: tail 2.8s ease-in-out infinite; transform-origin: 180px 150px; }
    .orbit { animation: orbit 5s linear infinite; transform-origin: 180px 128px; }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: scale(0.96); }
      50% { opacity: 0.9; transform: scale(1.04); }
    }
    @keyframes flapL {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(-8deg) translateY(-3px); }
    }
    @keyframes flapR {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(8deg) translateY(-3px); }
    }
    @keyframes tail {
      0%, 100% { transform: translateY(0); opacity: 0.85; }
      50% { transform: translateY(4px); opacity: 1; }
    }
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <rect width="360" height="280" fill="transparent"/>

  <circle class="pulse" cx="180" cy="128" r="92" fill="url(#glow)"/>

  <g class="orbit" opacity="0.45">
    <circle cx="180" cy="128" r="108" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 10"/>
    <circle cx="288" cy="128" r="3" fill="#a855f7"/>
  </g>

  <g class="tail" filter="url(#soft)">
    <path d="M180 156 C168 188 160 214 154 238 C176 220 188 198 180 156Z" fill="#7c3aed" opacity="0.75"/>
    <path d="M180 156 C192 188 200 214 206 238 C184 220 172 198 180 156Z" fill="#8b5cf6" opacity="0.75"/>
    <path d="M180 156 C180 196 180 226 180 248 C180 226 180 196 180 156Z" fill="#c4b5fd" opacity="0.9"/>
  </g>

  <g class="wingL" filter="url(#soft)">
    <path d="M180 118 C150 96 108 88 72 98 C98 108 132 118 156 132 C166 126 174 122 180 118Z" fill="url(#wingL)"/>
    <path d="M180 118 C148 112 112 118 84 136 C112 132 144 128 168 138 C174 130 178 124 180 118Z" fill="#6366f1" opacity="0.75"/>
  </g>

  <g class="wingR" filter="url(#soft)">
    <path d="M180 118 C210 96 252 88 288 98 C262 108 228 118 204 132 C194 126 186 122 180 118Z" fill="url(#wingR)"/>
    <path d="M180 118 C212 112 248 118 276 136 C248 132 216 128 192 138 C186 130 182 124 180 118Z" fill="#a855f7" opacity="0.75"/>
  </g>

  <g filter="url(#soft)">
    <ellipse cx="180" cy="124" rx="18" ry="24" fill="url(#core)"/>
    <path d="M180 98 C174 88 168 84 162 86 C168 92 174 96 180 98Z" fill="#e9d5ff"/>
    <circle cx="174" cy="118" r="2.5" fill="#1e1b4b"/>
    <circle cx="186" cy="118" r="2.5" fill="#1e1b4b"/>
    <path d="M176 128 C180 132 184 132 188 128" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
