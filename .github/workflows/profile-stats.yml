name: Update profile stats

on:
  workflow_call:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}&show_icons=true&hide_border=true
            &count_private=true&include_all_commits=true&theme=tokyonight
            &bg_color=0d1117&title_color=a78bfa&icon_color=8b5cf6&text_color=c9d1d9
            &border_radius=12&hide_rank=true&hide=stars
          path: profile/github-stats.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}&layout=donut-vertical&hide_border=true
            &theme=transparent&bg_color=0d1117&title_color=A78BFA&icon_color=8B5CF6
            &text_color=C9D1D9&border_radius=12&langs_count=6
            &hide=jupyter%20notebook,php,c,shell,dockerfile,html,css,makefile,vue,tsql,ejs
            &custom_title=Core%20Languages
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >-
            user=${{ github.repository_owner }}&theme=dark&hide_border=true
            &background=0D1117&border=0D1117&stroke=8B5CF6&ring=A78BFA&fire=C084FC
            &currStreakLabel=A78BFA&currStreakNum=FFFFFF&sideLabels=C9D1D9
            &sideNums=FFFFFF&dates=8B949E&border_radius=12&disable_animations=true
            &hide_total_contributions=true
          path: profile/streak.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fix streak card contrast for dark READMEs
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path("profile/streak.svg")
          svg = p.read_text()
          # Action sometimes emits near-white card fill with white numerals.
          svg = re.sub(
              r"(<g style='isolation: isolate'>\s*<rect stroke='#000000' stroke-opacity='0' fill=')[^']+(')",
              r"\g<1>#0d1117\2",
              svg,
              count=1,
          )
          svg = svg.replace("fill='#FFFEFE'", "fill='#0d1117'").replace('fill="#FFFEFE"', 'fill="#0d1117"')
          p.write_text(svg)
          print("streak card fill fixed")
          PY

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile stats SVGs"
          git pull --rebase origin main
          git push
