name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate public repository stats
        run: node scripts/generate-public-profile-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: nckhemanth

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >-
            user=${{ github.repository_owner }}&hide_border=true&background=0d1117
            &stroke=8b5cf6&ring=8b5cf6&fire=a855f7&currStreakLabel=8b5cf6
            &sideLabels=c9d1d9&dates=8b949e&border_radius=12&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile stats SVGs"
          git push
