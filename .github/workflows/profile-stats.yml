name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}&show_icons=true&hide_border=true
            &count_private=true&include_all_commits=true&theme=tokyonight
            &bg_color=0d1117&title_color=a78bfa&icon_color=8b5cf6&text_color=c9d1d9
            &border_radius=12&show=reviews,prs_merged,discussions_started
          path: profile/github-stats.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}&layout=donut-vertical&hide_border=true
            &theme=transparent&bg_color=0d1117&title_color=A78BFA&icon_color=8B5CF6
            &text_color=C9D1D9&border_radius=12&langs_count=6
            &hide=jupyter%20notebook,php,c,shell,dockerfile,html,css,makefile,vue,tsql,ejs
            &custom_title=Core%20Languages
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >-
            user=${{ github.repository_owner }}&hide_border=true&background=0d1117
            &stroke=8b5cf6&ring=a78bfa&fire=c084fc&currStreakLabel=a78bfa
            &currStreakNum=ffffff&sideLabels=c9d1d9&sideNums=ffffff&dates=8b949e
            &border_radius=12&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.STATS_TOKEN != '' && secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile stats SVGs"
          git push
